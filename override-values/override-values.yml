useHostName: true
useIngress: true
useAutoScaling: false
useWorkloadIdentity: true
useSecretsVault: false
useSnowflakeCredentials: false

resource:
  limits:
    memory: '256Mi'
    cpu: '250m'

livenessProbe:
  port: 8080
  healthPath: '/health'
  initialDelaySeconds: 30
  periodSeconds: 60
  failureThreshold: 3

## Ingress ########################################################################################
ingress:
  paths:
    - path: /de/securities/rules
      pathType: Prefix
      serviceName: security-rules
      servicePort: 80
###################################################################################################

